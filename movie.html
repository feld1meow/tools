<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Объективная оценка фильма</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --radius: 12px;
            
            /* Цвета рейтинга */
            --rating-high: #10b981; /* Зеленый */
            --rating-mid: #f59e0b;  /* Желтый */
            --rating-low: #ef4444;  /* Красный */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calculator-card {
            background-color: var(--card-bg);
            padding: 32px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .criterion {
            margin-bottom: 20px;
        }

        .criterion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .criterion-label {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .criterion-weight {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--bg-color);
            padding: 2px 8px;
            border-radius: 999px;
        }

        .range-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: var(--primary-color);
            height: 6px;
            border-radius: 4px;
            cursor: pointer;
        }

        .value-display {
            width: 40px;
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--primary-color);
        }

        .result-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 2px dashed var(--border-color);
            text-align: center;
        }

        .result-label {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .final-score {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            transition: color 0.3s ease;
        }

        /* Адаптивность для телефонов */
        @media (max-width: 480px) {
            .calculator-card {
                padding: 24px 16px;
            }
            .final-score {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

    <main class="calculator-card">
        <header class="header">
            <h1>Рейтинг фильма</h1>
            <p>Оцените параметры от 1 до 10</p>
        </header>

        <form id="rating-form">
            <div class="criterion">
                <div class="criterion-header">
                    <span class="criterion-label">Сценарий и логика</span>
                    <span class="criterion-weight">Вес: 30%</span>
                </div>
                <div class="range-wrapper">
                    <input type="range" id="scenario" min="1" max="10" step="1" value="5" data-weight="0.3">
                    <span class="value-display" id="scenario-val">5</span>
                </div>
            </div>

            <div class="criterion">
                <div class="criterion-header">
                    <span class="criterion-label">Режиссура и ритм</span>
                    <span class="criterion-weight">Вес: 20%</span>
                </div>
                <div class="range-wrapper">
                    <input type="range" id="direction" min="1" max="10" step="1" value="5" data-weight="0.2">
                    <span class="value-display" id="direction-val">5</span>
                </div>
            </div>

            <div class="criterion">
                <div class="criterion-header">
                    <span class="criterion-label">Актерская игра</span>
                    <span class="criterion-weight">Вес: 15%</span>
                </div>
                <div class="range-wrapper">
                    <input type="range" id="acting" min="1" max="10" step="1" value="5" data-weight="0.15">
                    <span class="value-display" id="acting-val">5</span>
                </div>
            </div>

            <div class="criterion">
                <div class="criterion-header">
                    <span class="criterion-label">Визуал и атмосфера</span>
                    <span class="criterion-weight">Вес: 15%</span>
                </div>
                <div class="range-wrapper">
                    <input type="range" id="visuals" min="1" max="10" step="1" value="5" data-weight="0.15">
                    <span class="value-display" id="visuals-val">5</span>
                </div>
            </div>

            <div class="criterion">
                <div class="criterion-header">
                    <span class="criterion-label">Музыка и звук</span>
                    <span class="criterion-weight">Вес: 10%</span>
                </div>
                <div class="range-wrapper">
                    <input type="range" id="music" min="1" max="10" step="1" value="5" data-weight="0.10">
                    <span class="value-display" id="music-val">5</span>
                </div>
            </div>

            <div class="criterion">
                <div class="criterion-header">
                    <span class="criterion-label">Эмоции (послевкусие)</span>
                    <span class="criterion-weight">Вес: 10%</span>
                </div>
                <div class="range-wrapper">
                    <input type="range" id="emotions" min="1" max="10" step="1" value="5" data-weight="0.10">
                    <span class="value-display" id="emotions-val">5</span>
                </div>
            </div>
        </form>

        <section class="result-section">
            <div class="result-label">Итоговая оценка</div>
            <div class="final-score" id="final-result">5.0</div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input[type="range"]');
            const resultDisplay = document.getElementById('final-result');

            // Функция расчета итоговой оценки
            function calculateRating() {
                let totalScore = 0;

                inputs.forEach(input => {
                    const value = parseFloat(input.value);
                    const weight = parseFloat(input.dataset.weight);
                    
                    // Обновляем отображение цифры рядом с ползунком
                    document.getElementById(`${input.id}-val`).textContent = value;
                    
                    // Считаем взвешенную сумму
                    totalScore += value * weight;
                });

                // Округляем до 1 знака после запятой
                const finalScore = totalScore.toFixed(1);
                resultDisplay.textContent = finalScore;

                // Меняем цвет в зависимости от оценки
                if (finalScore >= 7.5) {
                    resultDisplay.style.color = 'var(--rating-high)';
                } else if (finalScore >= 5.0) {
                    resultDisplay.style.color = 'var(--rating-mid)';
                } else {
                    resultDisplay.style.color = 'var(--rating-low)';
                }
            }

            // Вешаем слушатель событий на все ползунки (срабатывает при перетаскивании)
            inputs.forEach(input => {
                input.addEventListener('input', calculateRating);
            });

            // Первичный расчет при загрузке страницы
            calculateRating();
        });
    </script>
</body>
</html>
